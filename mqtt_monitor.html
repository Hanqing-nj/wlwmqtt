<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT传感器监控 - 纯HTML版</title>
    <!-- MQTT.js CDN -->
    <script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <style>
        :root {
            --primary-color: #6C63FF;
            --secondary-color: #4CC9F0;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --card-bg: rgba(255, 255, 255, 0.85);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #6C63FF 0%, #4CC9F0 100%);
            min-height: 100vh;
            padding: 20px;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== 连接状态按钮（可点击） ===== */
        .connection-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            user-select: none;
        }

        .connection-status:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .connection-status:active {
            transform: translateY(0) scale(0.98);
        }

        .status-connected { background: var(--success-color); }
        .status-disconnected { background: var(--danger-color); }
        .status-connecting { background: var(--warning-color); cursor: default; }
        .status-connecting:hover { transform: none; box-shadow: none; }

        /* ===== 模态弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: modalFadeIn 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #333;
            font-size: 1.3em;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #666;
        }

        .modal-close:hover {
            background: #e0e0e0;
            color: #333;
            transform: rotate(90deg);
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .config-field label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
            font-size: 0.9em;
        }

        .config-field input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95em;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .config-field input:focus {
            border-color: var(--primary-color);
        }

        .config-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-connect {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            color: white;
        }

        .btn-connect.connect {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-connect.disconnect {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-connect:hover {
            transform: translateY(-3px) scale(1.05);
        }

        .btn-connect:active {
            transform: translateY(-1px) scale(0.98);
        }

        .btn-connect:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 仪表盘 ===== */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card.person-card {
            grid-column: span 2;
        }

        .card.person-card h3 {
            color: #333;
            font-size: 1.4em;
            margin-bottom: 20px;
        }

        .card.person-card .person-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.05), rgba(76, 201, 240, 0.05));
            padding: 20px 25px;
            border-radius: 15px;
            border: 1px solid rgba(108, 99, 255, 0.15);
        }

        .card.person-card .data-point {
            font-size: 2.8em;
            color: #333;
            margin: 0;
            min-width: 200px;
        }

        .card.person-card .confidence-inline {
            font-size: 1.1em;
            color: #666;
            background: white;
            padding: 10px 18px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(108, 99, 255, 0.2);
        }

        /* CSS 图标 */
        .css-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .icon-person {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50% 50% 0 0;
            position: relative;
        }
        .icon-person::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 10px;
            background: #667eea;
            border-radius: 8px 8px 0 0;
        }

        .icon-temperature {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            position: relative;
        }
        .icon-temperature::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 6px;
            background: #f5576c;
        }

        .icon-humidity {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
        }

        .icon-light {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(250, 112, 154, 0.6);
        }

        .icon-co2 {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 3px;
            position: relative;
        }
        .icon-co2::before,
        .icon-co2::after {
            content: '';
            position: absolute;
            background: #a8edea;
        }
        .icon-co2::before { top: 2px; left: 2px; width: 4px; height: 4px; border-radius: 50%; }
        .icon-co2::after { bottom: 2px; right: 2px; width: 4px; height: 4px; border-radius: 50%; }

        .icon-voc {
            border: 3px solid #667eea;
            border-radius: 3px;
            position: relative;
        }
        .icon-voc::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
        }

        .icon-formaldehyde {
            border: 3px solid #f5576c;
            border-radius: 50%;
            position: relative;
        }
        .icon-formaldehyde::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 2px;
            background: #f5576c;
        }

        .icon-status {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 6px;
            vertical-align: middle;
        }

        .icon-lights {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(246, 211, 101, 0.6);
        }

        .icon-fan {
            border: 3px solid #4facfe;
            border-radius: 50%;
            position: relative;
            animation: none;
        }
        .icon-fan::before,
        .icon-fan::after {
            content: '';
            position: absolute;
            background: #4facfe;
        }
        .icon-fan::before { top: 50%; left: 0; width: 100%; height: 3px; transform: translateY(-50%); }
        .icon-fan::after { left: 50%; top: 0; height: 100%; width: 3px; transform: translateX(-50%); }

        .icon-humidifier {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 50% 50% 0 0;
            position: relative;
        }
        .icon-humidifier::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #4facfe;
            border-radius: 50%;
            opacity: 0.7;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.15s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.25s; }
        .card:nth-child(5) { animation-delay: 0.3s; }
        .card:nth-child(6) { animation-delay: 0.35s; }
        .card:nth-child(7) { animation-delay: 0.4s; }
        .card:nth-child(8) { animation-delay: 0.45s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i { font-size: 1.5em; }

        .data-point {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
            transition: all 0.3s ease;
        }

        .data-point.update {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); color: var(--primary-color); }
        }

        /* ===== 控制面板 ===== */
        .control-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease-out 0.5s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .control-panel h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5em;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .control-group {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(248, 250, 252, 0.95));
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(108, 99, 255, 0.1);
        }

        .control-group::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: left 0.5s ease;
        }

        .control-group:hover::before { left: 100%; }

        .control-group:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 1), rgba(241, 245, 249, 1));
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.25);
            border-color: rgba(108, 99, 255, 0.3);
        }

        .control-group h4 {
            margin-bottom: 10px;
            color: #6C63FF;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 1em;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::after { width: 300px; height: 300px; }
        .btn:hover { transform: translateY(-3px) scale(1.05); }
        .btn:active { transform: translateY(-1px) scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .btn-on {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .btn-off {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        .btn-auto {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-on:hover { background: linear-gradient(135deg, #059669, #047857); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6); }
        .btn-off:hover { background: linear-gradient(135deg, #dc2626, #b91c1c); box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6); }
        .btn-auto:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); }

        /* ===== 日志 ===== */
        .log-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            height: 250px;
            overflow-y: auto;
            display: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .log-container.show {
            display: block;
            animation: expandIn 0.4s ease-out;
        }

        @keyframes expandIn {
            from { opacity: 0; transform: scaleY(0.8); }
            to { opacity: 1; transform: scaleY(1); }
        }

        .log-toggle-btn {
            background: linear-gradient(135deg, #6C63FF, #4CC9F0);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 15px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .log-toggle-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .log-toggle-btn:hover::before { left: 100%; }
        .log-toggle-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 25px rgba(108, 99, 255, 0.5); }
        .log-toggle-btn:active { transform: translateY(-1px) scale(0.98); }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 300px;
            animation: toastSlideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
        }

        .toast.success { border-left: 4px solid #28a745; }
        .toast.error { border-left: 4px solid #dc3545; }
        .toast.info { border-left: 4px solid #3b82f6; }

        .toast-icon {
            font-size: 1.5em;
            animation: iconBounce 0.6s ease;
        }

        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .toast-message { flex: 1; color: #333; }

        @keyframes toastSlideIn {
            from { transform: translateX(400px) rotate(10deg); opacity: 0; }
            to { transform: translateX(0) rotate(0deg); opacity: 1; }
        }

        .log-container h3 { margin-bottom: 15px; color: #333; }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #f0f0f0;
            font-family: monospace;
            font-size: 0.9em;
            color: #666;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .card.person-card { grid-column: span 1; }
            .control-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .config-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <!-- MQTT 连接配置弹窗 -->
    <div class="modal-overlay" id="configModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ MQTT 连接配置</h3>
                <button class="modal-close" onclick="closeConfigModal()">✕</button>
            </div>
            <div class="config-grid">
                <div class="config-field">
                    <label>服务器地址 (Host)</label>
                    <input type="text" id="mqttHost" value="h1eee66a.ala.cn-hangzhou.emqxsl.cn" placeholder="例如：broker.emqx.io">
                </div>
                <div class="config-field">
                    <label>WebSocket 端口</label>
                    <input type="number" id="mqttPort" value="8084" placeholder="SSL: 8084 / 非SSL: 8083">
                </div>
                <div class="config-field">
                    <label>路径 (Path)</label>
                    <input type="text" id="mqttPath" value="/mqtt" placeholder="例如：/mqtt">
                </div>
                <div class="config-field">
                    <label>用户名</label>
                    <input type="text" id="mqttUsername" value="ZHQ" placeholder="MQTT 用户名">
                </div>
                <div class="config-field">
                    <label>密码</label>
                    <input type="password" id="mqttPassword" value="12345678" placeholder="MQTT 密码">
                </div>
                <div class="config-field">
                    <label>订阅主题</label>
                    <input type="text" id="mqttTopic" value="hbmzu" placeholder="例如：hbmzu">
                </div>
            </div>
            <div class="config-actions">
                <button class="btn-connect connect" id="btnConnect" onclick="connectMQTT()">🔗 连接 MQTT</button>
                <button class="btn-connect disconnect" id="btnDisconnect" onclick="disconnectMQTT()" style="display:none;">🔌 断开连接</button>
                <span id="configHint" style="color:#888; font-size:0.9em;">请确认 MQTT 服务器支持 WebSocket 连接</span>
            </div>
        </div>
    </div>

    <!-- 头部 -->
    <div class="header">
        <h1>🏠 HBMZU 智能家居监控系统</h1>
        <div class="connection-status status-disconnected" id="connectionStatus" onclick="onConnectionStatusClick()">
            ❌ 未连接
        </div>
    </div>

        <!-- 传感器仪表盘 -->
        <div class="dashboard">
            <div class="card person-card">
                <h3><span class="css-icon icon-person"></span>人员状态</h3>
                <div class="person-info">
                    <div class="data-point" id="personData">--</div>
                    <div class="confidence-inline" id="confidenceData">置信度：--</div>
                </div>
            </div>
            <div class="card">
                <h3><span class="css-icon icon-temperature"></span>温度</h3>
                <div class="data-point" id="tempData">-- °C</div>
            </div>
            <div class="card">
                <h3><span class="css-icon icon-humidity"></span>湿度</h3>
                <div class="data-point" id="humidityData">-- %</div>
            </div>
            <div class="card">
                <h3><span class="css-icon icon-light"></span>光照</h3>
                <div class="data-point" id="lightData">-- lux</div>
            </div>
            <div class="card">
                <h3><span class="css-icon icon-co2"></span>CO2</h3>
                <div class="data-point" id="co2Data">-- ppm</div>
            </div>
            <div class="card">
                <h3><span class="css-icon icon-voc"></span>VOC</h3>
                <div class="data-point" id="tvocData">-- mg/m³</div>
            </div>
            <div class="card">
                <h3><span class="css-icon icon-formaldehyde"></span>甲醛</h3>
                <div class="data-point" id="formaldehydeData">-- mg/m³</div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <h3><span class="css-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 3px;"></span> 设备状态监控</h3>
            <div class="control-grid" style="margin-bottom: 20px;">
                <div class="control-group">
                    <h4><span class="icon-status icon-lights"></span>灯光状态</h4>
                    <div class="data-point" id="lightsStatus" style="font-size: 1.5em;">--</div>
                </div>
                <div class="control-group">
                    <h4><span class="icon-status icon-fan"></span>风扇状态</h4>
                    <div class="data-point" id="fanStatus" style="font-size: 1.5em;">--</div>
                </div>
                <div class="control-group">
                    <h4><span class="icon-status icon-humidifier"></span>加湿器状态</h4>
                    <div class="data-point" id="humidifierStatus" style="font-size: 1.5em;">--</div>
                </div>
            </div>

            <h3><span class="css-icon" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); border-radius: 50%;"></span> 设备控制面板</h3>
            <div class="control-grid">
                <div class="control-group">
                    <h4><span class="icon-status icon-lights"></span>灯光控制</h4>
                    <div class="button-group">
                        <button class="btn btn-on" onclick="sendControlCommand('lights', 'on', '灯光')">开灯</button>
                        <button class="btn btn-off" onclick="sendControlCommand('lights', 'off', '灯光')">关灯</button>
                    </div>
                </div>
                <div class="control-group">
                    <h4><span class="icon-status icon-fan"></span>风扇控制</h4>
                    <div class="button-group">
                        <button class="btn btn-on" onclick="sendControlCommand('fan', 'high', '风扇')">高风</button>
                        <button class="btn btn-auto" onclick="sendControlCommand('fan', 'medium', '风扇')">中风</button>
                        <button class="btn btn-off" onclick="sendControlCommand('fan', 'off', '风扇')">关风扇</button>
                    </div>
                </div>
                <div class="control-group">
                    <h4><span class="icon-status icon-humidifier"></span>加湿器控制</h4>
                    <div class="button-group">
                        <button class="btn btn-on" onclick="sendControlCommand('humidifier', 'target_50%', '加湿器')">50% 湿度</button>
                        <button class="btn btn-auto" onclick="sendControlCommand('humidifier', 'medium', '加湿器')">中风</button>
                        <button class="btn btn-off" onclick="sendControlCommand('humidifier', 'off', '加湿器')">关加湿器</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div>
            <button class="log-toggle-btn" onclick="toggleLogContainer()" id="logToggleBtn">
                📋 显示系统日志
            </button>
            <div class="log-container" id="logContainerWrapper">
                <h3>📋 系统日志 (hbmzu 主题)</h3>
                <div id="logContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // MQTT 纯前端客户端 - 全局状态
        // ==========================================
        let mqttClient = null;
        let isConnected = false;
        let logMessages = [];

        // 传感器数据
        const sensorData = {
            temperature: '--',
            humidity: '--',
            light_intensity: '--',
            co2: '--',
            voc: '--',
            formaldehyde: '--',
            occupancy_status: '--',
            occupancy_confidence: '--'
        };

        // 设备控制命令状态
        const controlCommands = {
            lights: '--',
            fan: '--',
            humidifier: '--'
        };

        // ==========================================
        // 弹窗控制
        // ==========================================
        function openConfigModal() {
            document.getElementById('configModal').classList.add('show');
        }

        function closeConfigModal() {
            document.getElementById('configModal').classList.remove('show');
        }

        function onConnectionStatusClick() {
            // 未连接或已连接时点击弹出配置弹窗
            if (!isConnected) {
                openConfigModal();
            } else {
                // 已连接时也允许打开弹窗以查看配置或断开
                openConfigModal();
            }
        }

        // 点击遮罩层关闭弹窗
        document.addEventListener('click', function (e) {
            if (e.target.id === 'configModal') {
                closeConfigModal();
            }
        });

        // ESC 键关闭弹窗
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeConfigModal();
            }
        });

        // ==========================================
        // MQTT 连接管理
        // ==========================================
        function connectMQTT() {
            const host = document.getElementById('mqttHost').value.trim();
            const port = document.getElementById('mqttPort').value.trim();
            const path = document.getElementById('mqttPath').value.trim();
            const username = document.getElementById('mqttUsername').value.trim();
            const password = document.getElementById('mqttPassword').value.trim();
            const topic = document.getElementById('mqttTopic').value.trim();

            if (!host || !port) {
                showToast('请填写服务器地址和端口', 'error');
                return;
            }

            // 更新 UI 为连接中状态
            updateConnectionUI('connecting');
            addLog('🔄 正在连接到 MQTT 服务器...');

            // 构建 WebSocket URL
            const wsProtocol = parseInt(port) === 8084 || parseInt(port) === 443 ? 'wss' : 'ws';
            const url = `${wsProtocol}://${host}:${port}${path}`;

            addLog(`🔗 连接地址：${url}`);
            addLog(`👤 使用账号：${username}`);

            // 创建 MQTT.js 客户端
            try {
                mqttClient = mqtt.connect(url, {
                    clientId: 'web_' + Math.random().toString(36).substring(2, 10),
                    clean: true,
                    connectTimeout: 10000,
                    reconnectPeriod: 5000,
                    username: username || undefined,
                    password: password || undefined,
                    // SSL 配置
                    rejectUnauthorized: false
                });

                // 连接成功回调
                mqttClient.on('connect', function () {
                    isConnected = true;
                    updateConnectionUI('connected');
                    addLog('✅ 成功连接到 MQTT 服务器');

                    // 订阅主题
                    if (topic) {
                        mqttClient.subscribe(topic, { qos: 0 }, function (err) {
                            if (err) {
                                addLog('❌ 订阅主题失败：' + err.message);
                            } else {
                                addLog('👂 已订阅主题：' + topic);
                            }
                        });
                    }

                    // 发布上线消息
                    publishSystemMessage('online', '系统已上线');
                    showToast('MQTT 连接成功', 'success');
                    // 连接成功后关闭弹窗
                    closeConfigModal();
                });

                // 接收消息回调
                mqttClient.on('message', function (receivedTopic, message) {
                    const payload = message.toString('utf-8');
                    addLog('📨 收到消息 [' + receivedTopic + ']: ' + payload);
                    handleSensorMessage(receivedTopic, payload);
                });

                // 断开连接回调
                mqttClient.on('close', function () {
                    isConnected = false;
                    updateConnectionUI('disconnected');
                    addLog('⚠️ 与 MQTT 服务器的连接已断开');
                });

                // 错误回调
                mqttClient.on('error', function (err) {
                    addLog('❌ MQTT 错误：' + err.message);
                    showToast('MQTT 连接错误：' + err.message, 'error');
                });

                // 重连回调
                mqttClient.on('reconnect', function () {
                    addLog('🔄 正在尝试重新连接...');
                    updateConnectionUI('connecting');
                });

            } catch (e) {
                addLog('❌ 创建 MQTT 客户端失败：' + e.message);
                updateConnectionUI('disconnected');
                showToast('连接失败：' + e.message, 'error');
            }
        }

        function disconnectMQTT() {
            if (mqttClient) {
                publishSystemMessage('offline', '系统已离线');
                mqttClient.end(true);
                mqttClient = null;
                isConnected = false;
                updateConnectionUI('disconnected');
                addLog('🔌 已主动断开与 MQTT 服务器的连接');
                showToast('已断开 MQTT 连接', 'info');
                closeConfigModal();
            }
        }

        // ==========================================
        // 消息处理
        // ==========================================
        function handleSensorMessage(topic, payload) {
            try {
                const data = JSON.parse(payload);
                if (typeof data !== 'object' || data === null) {
                    addLog('⚠️ 收到的不是有效的 JSON 对象');
                    return;
                }

                // 解析传感器数据
                const sData = data.sensor_data || {};

                // 解析人员状态
                const occupancy = sData.occupancy || {};
                const occupancyStatus = occupancy.status || '--';
                const occupancyConfidence = occupancy.confidence || '--';

                const occupancyStateMap = {
                    'none': '🚫 无人',
                    'standing': '🧍 站立',
                    'sitting': '🪑 坐着',
                    'fallen': '🆘 跌倒',
                    'walking': '🚶 走动'
                };
                sensorData.occupancy_status = occupancyStateMap[occupancyStatus] || ('❓ ' + occupancyStatus);

                if (typeof occupancyConfidence === 'number') {
                    sensorData.occupancy_confidence = (occupancyConfidence * 100).toFixed(1) + '%';
                } else {
                    sensorData.occupancy_confidence = occupancyConfidence;
                }

                // 解析环境数据
                const environment = sData.environment || {};
                sensorData.temperature = environment.temperature !== undefined ? String(environment.temperature) : '--';
                sensorData.humidity = environment.humidity !== undefined ? String(environment.humidity) : '--';
                sensorData.light_intensity = environment.light_intensity !== undefined ? String(environment.light_intensity) : '--';
                sensorData.co2 = environment.co2 !== undefined ? String(environment.co2) : '--';
                sensorData.voc = environment.voc !== undefined ? String(environment.voc) : '--';
                sensorData.formaldehyde = environment.formaldehyde !== undefined ? String(environment.formaldehyde) : '--';

                // 解析控制命令状态
                const ctrlCmds = data.control_commands || {};
                if (typeof ctrlCmds === 'object') {
                    if ('lights' in ctrlCmds) controlCommands.lights = ctrlCmds.lights;
                    if ('fan' in ctrlCmds) controlCommands.fan = ctrlCmds.fan;
                    if ('humidifier' in ctrlCmds) controlCommands.humidifier = ctrlCmds.humidifier;
                }

                // 更新 UI
                updateDashboardUI();
                addLog('✅ 传感器数据更新 - 温度：' + sensorData.temperature + '°C, 人员状态：' + sensorData.occupancy_status);

            } catch (e) {
                addLog('❌ 消息处理错误：' + e.message);
            }
        }

        // ==========================================
        // 命令发送
        // ==========================================
        function sendControlCommand(topicKey, command, deviceName) {
            if (!isConnected || !mqttClient) {
                showToast('MQTT 未连接，无法发送命令', 'error');
                return;
            }

            const topic = document.getElementById('mqttTopic').value.trim() + '/controller';
            const message = {
                timestamp: new Date().toISOString(),
                control_commands: {}
            };
            message.control_commands[topicKey] = command;

            const payload = JSON.stringify(message);
            mqttClient.publish(topic, payload, { qos: 0 });
            addLog('📤 已发送命令到 ' + topic + ': ' + topicKey + ' = ' + command);
            showToast(deviceName + ' 控制成功：' + command, 'success');
        }

        function publishSystemMessage(messageType, content) {
            if (!isConnected || !mqttClient) return;

            const topic = 'hbmzu/system/' + messageType;
            const message = {
                type: messageType,
                content: content,
                timestamp: Math.floor(Date.now() / 1000),
                platform: 'Web MQTT Client'
            };

            mqttClient.publish(topic, JSON.stringify(message), { qos: 0 });
        }

        // ==========================================
        // UI 更新函数
        // ==========================================
        function updateConnectionUI(state) {
            const statusEl = document.getElementById('connectionStatus');
            const btnConnect = document.getElementById('btnConnect');
            const btnDisconnect = document.getElementById('btnDisconnect');

            switch (state) {
                case 'connected':
                    statusEl.className = 'connection-status status-connected';
                    statusEl.innerHTML = '✅ 已连接';
                    btnConnect.style.display = 'none';
                    btnDisconnect.style.display = 'inline-block';
                    break;
                case 'connecting':
                    statusEl.className = 'connection-status status-connecting';
                    statusEl.innerHTML = '⏳ 连接中...';
                    btnConnect.disabled = true;
                    break;
                case 'disconnected':
                    statusEl.className = 'connection-status status-disconnected';
                    statusEl.innerHTML = '❌ 未连接';
                    btnConnect.style.display = 'inline-block';
                    btnConnect.disabled = false;
                    btnDisconnect.style.display = 'none';
                    break;
            }
        }

        function updateDashboardUI() {
            // 更新传感器数据
            updateDataPoint('tempData', sensorData.temperature + ' °C');
            updateDataPoint('humidityData', sensorData.humidity + ' %');
            updateDataPoint('lightData', sensorData.light_intensity + ' lux');
            updateDataPoint('co2Data', sensorData.co2 + ' ppm');
            updateDataPoint('tvocData', sensorData.voc + ' mg/m³');
            updateDataPoint('formaldehydeData', sensorData.formaldehyde + ' mg/m³');
            updateDataPoint('personData', sensorData.occupancy_status);

            // 更新置信度
            const confidenceEl = document.getElementById('confidenceData');
            if (confidenceEl) {
                confidenceEl.textContent = '置信度：' + sensorData.occupancy_confidence;
            }

            // 更新设备状态
            updateDeviceStatus('lightsStatus', controlCommands.lights);
            updateDeviceStatus('fanStatus', controlCommands.fan);
            updateDeviceStatus('humidifierStatus', controlCommands.humidifier);
        }

        function updateDataPoint(elementId, value) {
            const element = document.getElementById(elementId);
            if (element && element.textContent !== value) {
                element.textContent = value;
                element.classList.remove('update');
                void element.offsetWidth;
                element.classList.add('update');
            }
        }

        function updateDeviceStatus(elementId, status) {
            const element = document.getElementById(elementId);
            if (!element) return;

            const statusTextMap = {
                'on': '开启',
                'off': '关闭',
                'low': '低风',
                'medium': '中风',
                'high': '高风',
                '--': '--'
            };

            let displayStatus;
            if (status && status.startsWith('target_')) {
                const targetValue = status.replace('target_', '').replace('%', '');
                displayStatus = '目标 ' + targetValue + '%';
            } else {
                displayStatus = statusTextMap[status] || status || '--';
            }

            if (element.textContent !== displayStatus) {
                element.textContent = displayStatus;
                element.style.transition = 'color 0.3s ease';
                element.style.color = '#667eea';
                setTimeout(function () {
                    element.style.color = '#333';
                }, 300);
            }
        }

        // ==========================================
        // 日志管理
        // ==========================================
        function addLog(message) {
            const now = new Date();
            const timestamp = now.toTimeString().substring(0, 8);
            const entry = '[' + timestamp + '] ' + message;
            logMessages.push(entry);

            // 限制日志数量
            if (logMessages.length > 100) {
                logMessages.shift();
            }

            // 更新日志 DOM
            const container = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.textContent = entry;
            container.appendChild(logEntry);
            container.scrollTop = container.scrollHeight;

            // 限制 DOM 中的日志条目数
            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }

            console.log(entry);
        }

        function toggleLogContainer() {
            const container = document.getElementById('logContainerWrapper');
            const btn = document.getElementById('logToggleBtn');

            if (container.classList.contains('show')) {
                container.classList.remove('show');
                btn.textContent = '📋 显示系统日志';
            } else {
                container.classList.add('show');
                btn.textContent = '📋 隐藏系统日志';
            }
        }

        // ==========================================
        // Toast 通知
        // ==========================================
        function showToast(message, type) {
            type = type || 'success';
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;

            const iconMap = { success: '✅', error: '❌', info: 'ℹ️' };
            const icon = iconMap[type] || '✅';

            toast.innerHTML = '<span class="toast-icon">' + icon + '</span><span class="toast-message">' + message + '</span>';
            container.appendChild(toast);

            setTimeout(function () {
                toast.style.animation = 'toastSlideIn 0.3s ease reverse';
                setTimeout(function () { toast.remove(); }, 300);
            }, 3000);
        }

        // ==========================================
        // 初始化
        // ==========================================
        document.addEventListener('DOMContentLoaded', function () {
            addLog('🌐 MQTT 传感器监控系统已加载（纯 HTML 版）');
            addLog('💡 点击右上角"未连接"按钮打开 MQTT 配置面板');
        });
    </script>
</body>
</html>
